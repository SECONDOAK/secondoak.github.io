<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brand Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Jost', 'sans-serif'],
            },
            colors: {
              voady: {
                primary: '#F53D73',    // --e-global-color-primary
                secondary: '#FFAEC7',  // --e-global-color-secondary
                text: '#310210',       // --e-global-color-text
                accent: '#EB6F93',     // --e-global-color-accent
                light: '#FDDCE6',      // --e-global-color-c08cdb6
                dark: '#C42755',       // --e-global-color-3f29caa
              }
            },
            backgroundImage: {
              'voady-gradient': 'linear-gradient(180deg, #FDDCE6 0%, #FFAEC7 50%, #F53D73 100%)',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --voady-primary: #F53D73;
        --voady-secondary: #FFAEC7;
        --voady-text: #310210;
        --voady-accent: #EB6F93;
        --voady-light: #FDDCE6;
        --voady-dark: #C42755;
      }
      body {
        font-family: 'Jost', sans-serif;
      }

      /* ── Workspace entrance animations ── */
      @keyframes ws-slide-left {
        from { opacity: 0; transform: translateX(-18px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes slide-in-right {
        from { opacity: 0; transform: translateX(40px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      .animate-slide-in-right {
        animation: slide-in-right 0.35s cubic-bezier(0.22,1,0.36,1) both;
        will-change: transform, opacity;
      }
      @keyframes ws-fade-zoom {
        from { opacity: 0; transform: scale(0.975); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes ws-slide-up {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes ws-navbar {
        from { opacity: 0; transform: translateY(-10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes ws-card-in {
        from { opacity: 0; transform: translateY(10px) scale(0.97); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      .ws-panel  {
        animation: ws-slide-left 0.45s cubic-bezier(0.22,1,0.36,1) both;
        will-change: transform, opacity;
      }
      .ws-canvas {
        animation: ws-fade-zoom 0.45s cubic-bezier(0.22,1,0.36,1) both;
        animation-delay: 70ms;
        will-change: transform, opacity;
      }
      .ws-vault {
        animation: ws-slide-up 0.45s cubic-bezier(0.22,1,0.36,1) both;
        animation-delay: 140ms;
        will-change: transform, opacity;
      }
      .ws-navbar {
        animation: ws-navbar 0.35s cubic-bezier(0.22,1,0.36,1) both;
        will-change: transform, opacity;
      }
      .ws-card {
        animation: ws-card-in 0.4s cubic-bezier(0.22,1,0.36,1) both;
        will-change: transform, opacity;
      }

      /* ── Light theme overrides ── */
      body.light-theme { background-color: #f1f5f9; color: #0f172a; }

      /* Backgrounds */
      body.light-theme .bg-slate-950 { background-color: #f1f5f9 !important; }
      body.light-theme .bg-slate-900 { background-color: #f8fafc !important; }
      body.light-theme .bg-slate-800 { background-color: #e2e8f0 !important; }
      body.light-theme .bg-slate-700 { background-color: #cbd5e1 !important; }
      body.light-theme .bg-black { background-color: #e2e8f0 !important; }
      body.light-theme .bg-black\/70 { background-color: rgba(241,245,249,0.95) !important; }
      body.light-theme .bg-black\/50 { background-color: rgba(241,245,249,0.8) !important; }

      /* Text */
      body.light-theme .text-white { color: #0f172a !important; }
      body.light-theme .text-slate-50 { color: #0f172a !important; }
      body.light-theme .text-slate-100 { color: #1e293b !important; }
      body.light-theme .text-slate-200 { color: #334155 !important; }
      body.light-theme .text-slate-300 { color: #475569 !important; }
      body.light-theme .text-slate-400 { color: #64748b !important; }
      body.light-theme .text-slate-500 { color: #94a3b8 !important; }

      /* Borders */
      body.light-theme .border-slate-800 { border-color: #e2e8f0 !important; }
      body.light-theme .border-slate-700 { border-color: #cbd5e1 !important; }
      body.light-theme .border-slate-600 { border-color: #94a3b8 !important; }

      /* Hover states */
      body.light-theme .hover\:bg-slate-900:hover { background-color: #f8fafc !important; }
      body.light-theme .hover\:bg-slate-800:hover { background-color: #e2e8f0 !important; }
      body.light-theme .hover\:bg-slate-700:hover { background-color: #cbd5e1 !important; }
      body.light-theme .hover\:border-slate-600:hover { border-color: #94a3b8 !important; }
      body.light-theme .hover\:border-slate-700:hover { border-color: #cbd5e1 !important; }
      body.light-theme .hover\:text-white:hover { color: #0f172a !important; }

      /* Group hover */
      body.light-theme .group:hover .group-hover\:bg-slate-700 { background-color: #cbd5e1 !important; }

      /* Focus / ring */
      body.light-theme .ring-slate-700 { --tw-ring-color: #cbd5e1; }

      /* Scrollbar in light mode */
      body.light-theme ::-webkit-scrollbar-track { background: #f1f5f9; }
      body.light-theme ::-webkit-scrollbar-thumb { background: #94a3b8; }
    </style>
